<div class="container-fluid pt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0" i18n="@@LogsViewer">Visor de Logs (SDA)</h3>
            <div class="d-flex align-items-center">
                <span class="mr-2" i18n="@@FilterByPeriod">Periodo:</span>
                <p-dropdown [options]="periods" [(ngModel)]="selectedPeriod" (onChange)="onPeriodChange()"
                    class="mr-3"></p-dropdown>
                <span class="mr-2" i18n="@@FilterByDate">Fecha:</span>
                <p-calendar [(ngModel)]="selectedDate" (onSelect)="onDateChange()" dateFormat="yy-mm-dd"
                    [showIcon]="true" [firstDayOfWeek]="firstDayOfWeek"></p-calendar>
            </div>
        </div>
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-12 text-center">
                    <div class="btn-group">
                        <button type="button" class="btn"
                            [ngClass]="logType === 'app' ? 'btn-primary' : 'btn-outline-primary'"
                            (click)="onTypeChange('app')" i18n="@@AppLogs">Logs Aplicación</button>
                        <button type="button" class="btn"
                            [ngClass]="logType === 'server' ? 'btn-primary' : 'btn-outline-primary'"
                            (click)="onTypeChange('server')" i18n="@@ServerLogs">Logs Servidor (stdout)</button>
                        <button type="button" class="btn"
                            [ngClass]="logType === 'error' ? 'btn-primary' : 'btn-outline-primary'"
                            (click)="onTypeChange('error')" i18n="@@ErrorLogs">Logs Errores (stderr)</button>
                    </div>
                </div>
            </div>

            <!-- App Logs Table -->
            <div *ngIf="logType === 'app'">
                <p-table #dt [value]="appLogs" [columns]="cols" [paginator]="true" [rows]="20" [responsive]="true"
                    [autoLayout]="true" sortField="date_str" [sortOrder]="-1">
                    <ng-template pTemplate="caption">
                        <div class="d-flex justify-content-end">
                            <span class="p-input-icon-left">
                                <i class="fa fa-search"></i>
                                <input #gb pInputText type="text" (input)="dt.filterGlobal(gb.value, 'contains')"
                                    placeholder="Buscar..." i18n-placeholder="@@Search"
                                    class="form-control d-inline-block w-auto ml-2" />
                            </span>
                        </div>
                    </ng-template>
                    <ng-template pTemplate="header" let-columns>
                        <tr>
                            <th *ngFor="let col of columns" [pSortableColumn]="col.field">
                                {{col.header}}
                                <p-sortIcon [field]="col.field"></p-sortIcon>
                            </th>
                        </tr>
                        <tr>
                            <th *ngFor="let col of columns">
                                <input #f pInputText type="text" (input)="dt.filter(f.value, col.field, 'contains')"
                                    placeholder="Filtro..." class="form-control form-control-sm" />
                            </th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-rowData let-columns="columns">
                        <tr>
                            <td *ngFor="let col of columns">
                                <span *ngIf="col.field === 'level'" class="badge"
                                    [ngClass]="{'badge-info': rowData[col.field] === 'info', 'badge-danger': rowData[col.field] === 'error', 'badge-warning': rowData[col.field] === 'warn'}">
                                    {{rowData[col.field]}}
                                </span>
                                <span *ngIf="col.field !== 'level'">
                                    {{rowData[col.field]}}
                                </span>
                            </td>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="emptymessage">
                        <tr>
                            <td [attr.colspan]="cols.length" class="text-center" i18n="@@NoLogsFound">No se encontraron
                                logs para esta fecha.</td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>

            <!-- Raw Logs View -->
            <div *ngIf="logType !== 'app'" class="raw-logs-container bg-dark text-light p-3 rounded">
                <pre class="text-light mb-0"
                    style="max-height: 600px; overflow-y: auto; white-space: pre-wrap; font-size: 0.85rem;">{{rawLogContent}}</pre>
            </div>
        </div>
    </div>
</div>
